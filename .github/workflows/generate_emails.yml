name: Generate Simulated Emails

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run this manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai python-dotenv

      - name: Run Email Generator
        # This maps your GitHub Secret to the environment variable the SDK expects
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python your_backend_script.py